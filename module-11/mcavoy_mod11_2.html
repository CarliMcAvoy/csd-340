<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSD 340 Web Development with HTML and CSS</title>
    <link href="mcavoy_mod11_2.css" type="text/css" rel="stylesheet">
</head>
<body>
<header><h1>Assignment 11.2: JavaScript - Part 3</h1></header>
<div id="container">
        <fieldset>
            <p>Enter a task below and click "Add" to add it to your To-Do List. Select "Delete Latest Entry to delete
            the last task entered. Select "Sort" to sort your list.</p>
            <input type="text" id="task" name="task" size="40" placeholder="Enter Task...">
            <div id="buttons">
                <label><button id="add" type="button">+ Add</button></label>
                <label><button id="delete" type="button">Delete Latest Entry</button></label>
                <label><button id="sort" type="button">Sort</button></label>
            </div>
        </fieldset>
    <h3>View List:</h3>
    <ul id="display"></ul>
</div>
<script>
    const input = document.getElementById("task")
    const addButton = document.getElementById("add")
    const deleteButton = document.getElementById("delete")
    const sortButton = document.getElementById("sort")
    const displayArray = document.getElementById("display")

    const taskArray = []

    function renderArray(){
        displayArray.innerHTML = " "

        input.forEach(inputText => {
            const li = document.createElement("li")
            li.textContent = inputText
            displayArray.appendChild(li)
        })
    }

    addButton.addEventListener("click", function(){
        const value = input.value.trim()

        if (value){
            taskArray.push(value)
            renderArray()
            input.value=""
            console.log("Current List:", taskArray)
        }
    })

    deleteButton.addEventListener("click", function(){
        if(taskArray.length > 0){
            const deletedTask = taskArray.pop()
            console.log(`Deleted: ${deletedTask}`)
            renderArray()
        } else{
            console.log("List is empty.")
        }
    })

    sortButton.addEventListener("click", function(){
        taskArray.sort()
        renderArray()
    })

    renderArray()
</script>
</body>
</html>
